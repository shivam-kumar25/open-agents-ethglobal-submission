<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="512" height="512" fill="#0A0A0A"/>

  <!-- Yellow outer border (brutalist) -->
  <rect x="14" y="14" width="484" height="484" stroke="#FFD60A" stroke-width="7" fill="none"/>

  <!-- ── Mesh connections ── -->
  <!-- Nodes: planner(256,148) researcher(162,208) executor(350,208) evaluator(192,300) evolution(320,300) -->

  <!-- planner → researcher -->
  <line x1="256" y1="148" x2="162" y2="208" stroke="#FFD60A" stroke-width="2.5" opacity="0.55"/>
  <!-- planner → executor -->
  <line x1="256" y1="148" x2="350" y2="208" stroke="#F72585" stroke-width="2.5" opacity="0.55"/>
  <!-- planner → evaluator -->
  <line x1="256" y1="148" x2="192" y2="300" stroke="#7B2FBE" stroke-width="1.8" opacity="0.35"/>
  <!-- planner → evolution -->
  <line x1="256" y1="148" x2="320" y2="300" stroke="#06D6A0" stroke-width="1.8" opacity="0.35"/>
  <!-- researcher → evaluator -->
  <line x1="162" y1="208" x2="192" y2="300" stroke="#00B4D8" stroke-width="2" opacity="0.45"/>
  <!-- executor → evolution -->
  <line x1="350" y1="208" x2="320" y2="300" stroke="#F72585" stroke-width="2" opacity="0.45"/>
  <!-- evaluator → evolution -->
  <line x1="192" y1="300" x2="320" y2="300" stroke="#7B2FBE" stroke-width="1.8" opacity="0.3"/>

  <!-- ── Nodes ── -->

  <!-- Planner (center-top, yellow, largest) -->
  <circle cx="256" cy="148" r="28" fill="#FFD60A" stroke="#000" stroke-width="4"/>

  <!-- Researcher (teal) -->
  <circle cx="162" cy="208" r="22" fill="#00B4D8" stroke="#000" stroke-width="3.5"/>

  <!-- Executor (pink) -->
  <circle cx="350" cy="208" r="22" fill="#F72585" stroke="#000" stroke-width="3.5"/>

  <!-- Evaluator (purple) -->
  <circle cx="192" cy="300" r="22" fill="#7B2FBE" stroke="#000" stroke-width="3.5"/>

  <!-- Evolution (green) -->
  <circle cx="320" cy="300" r="22" fill="#06D6A0" stroke="#000" stroke-width="3.5"/>

  <!-- ── Wordmark ── -->

  <!-- "NEURAL" -->
  <text
    x="256" y="398"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-size="82"
    font-weight="900"
    fill="#FFFFFF"
    text-anchor="middle"
    letter-spacing="-3">NEURAL</text>

  <!-- Divider line -->
  <line x1="60" y1="414" x2="452" y2="414" stroke="#333" stroke-width="2"/>

  <!-- "/MESH" — slash in pink, MESH in white -->
  <text
    x="256" y="470"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-size="72"
    font-weight="900"
    fill="#FFFFFF"
    text-anchor="middle"
    letter-spacing="-2">/MESH</text>

  <!-- Slash overlay in pink -->
  <text
    x="191" y="470"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-size="72"
    font-weight="900"
    fill="#F72585"
    text-anchor="middle"
    letter-spacing="-2">/</text>

  <!-- Tiny tagline -->
  <text
    x="256" y="498"
    font-family="'Courier New', monospace"
    font-size="11"
    fill="#444"
    text-anchor="middle"
    letter-spacing="3.5">OPEN AGENTS · SEPOLIA</text>

</svg>
